<!DOCTYPE html>
<html>
<head>
<title>Mr & Mrs Food Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#ff6a00;
text-align:center;
padding:15px;
}

.container{
padding:15px;
}

.category{
margin-top:25px;
font-size:22px;
border-bottom:2px solid #444;
padding-bottom:5px;
}

.food{
background:#222;
margin:8px 0;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
display:flex;
gap:8px;
align-items:center;
}

.qty button{
width:28px;
height:28px;
background:#ff6a00;
border:none;
color:white;
font-size:18px;
border-radius:5px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

.orderbtn{
background:#25D366;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:10px;
margin-top:10px;
}

.total{
font-size:20px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h2>Mr & Mrs Food Maker</h2>
<p>Order Food Online | Badarpur</p>
</header>

<div class="container" id="menu"></div>

<div class="container">

<h3>Customer Details</h3>

<input id="name" placeholder="Your Name">
<input id="address" placeholder="Delivery Address">

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<button class="orderbtn" onclick="sendOrder()">Order on WhatsApp</button>

<h3>Book a Table</h3>

<input id="tableName" placeholder="Your Name">
<input id="tablePhone" placeholder="Phone Number">
<input id="tableDate" type="date">
<input id="tableTime" type="time">
<input id="tableGuests" placeholder="Number of Guests">

<button class="orderbtn" onclick="bookTable()">Book Table</button>

</div>

<script>

let menu = {

"Starter":{
"Chicken Pakoda":90,
"Veg Pakoda":80,
"Paneer Pakoda":150,
"Onion Pakoda":80,
"Crispy Chicken":150,
"Leg Piece":100,
"Wings Lollipop":100,
"French Fries":100
},

"Tawa":{
"Roti":10,
"Butter Roti":15,
"Plain Paratha":30,
"Aloo Paratha":40
},

"Manchurian":{
"Veg Manchurian":120,
"Chicken Manchurian":180,
"Paneer Manchurian":200,
"Gobi Manchurian":150
},

"Rice":{
"Veg Fried Rice":100,
"Jeera Rice":80,
"Ghee Rice":100,
"Steam Rice":70,
"Egg Fried Rice":120,
"Chicken Fried Rice":150,
"Mixed Fried Rice":160,
"Paneer Fried Rice":150
},

"Chicken Items":{
"Chicken Masala":200,
"Butter Chicken Masala":220,
"Chicken Kosha":200,
"Chilli Chicken":180,
"Chicken Dry Fry":180,
"Chicken Leg Masala":180,
"Spicy Chicken Dry Fry":200
},

"Chowmein":{
"Veg Chowmein":100,
"Chicken Chowmein":140,
"Egg Chowmein":110,
"Paneer Chowmein":150,
"Mix Chowmein":120
},

"Biriyani":{
"Hyderabadi Biriyani":250,
"Dum Biriyani":200
},

"Pizza":{
"Margherita Pizza":150,
"Corn Veggies Pizza":180,
"Paneer Veggies Pizza":210,
"Corn Paneer Pizza":220,
"Blockbuster Pizza":260,
"Chicken Pizza":280,
"Loaded All In One":300
},

"Momo":{
"Chicken Momo":70,
"Veg Momo":50
},

"Burger":{
"Veg Burger":90,
"Chicken Burger":130
},

"Drinks":{
"Masala Coke":40,
"Lassi":60,
"Hot Coffee":20,
"Cold Coffee":50,
"Milkshake":70,
"Tea":15
}

};

let quantities={};

let menuDiv=document.getElementById("menu");

for(let category in menu){

let title=document.createElement("div");
title.className="category";
title.innerText=category;

menuDiv.appendChild(title);

for(let item in menu[category]){

let price=menu[category][item];

let food=document.createElement("div");
food.className="food";

let name=document.createElement("span");
name.innerText=item+" ₹"+price;

let qtyDiv=document.createElement("div");
qtyDiv.className="qty";

let minus=document.createElement("button");
minus.innerText="-";

let plus=document.createElement("button");
plus.innerText="+";

let qty=document.createElement("span");
qty.innerText="0";

quantities[item]=0;

minus.onclick=function(){

if(quantities[item]>0){
quantities[item]--;
qty.innerText=quantities[item];
updateTotal();
}

}

plus.onclick=function(){

quantities[item]++;
qty.innerText=quantities[item];
updateTotal();

}

qtyDiv.appendChild(minus);
qtyDiv.appendChild(qty);
qtyDiv.appendChild(plus);

food.appendChild(name);
food.appendChild(qtyDiv);

menuDiv.appendChild(food);

}

}

function updateTotal(){

let total=0;

for(let category in menu){
for(let item in menu[category]){

total+=quantities[item]*menu[category][item];

}
}

document.getElementById("total").innerText=total;

}

function sendOrder(){

let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

let msg="Order from Mr & Mrs Food Maker%0A";

msg+="Name: "+name+"%0A";
msg+="Address: "+address+"%0A%0A";

let total=0;

for(let category in menu){
for(let item in menu[category]){

if(quantities[item]>0){

msg+=item+" x "+quantities[item]+"%0A";
total+=quantities[item]*menu[category][item];

}

}
}

msg+="%0ATotal ₹"+total;

window.open("https://wa.me/918453049219?text="+msg);

}

function bookTable(){

let name=document.getElementById("tableName").value;
let phone=document.getElementById("tablePhone").value;
let date=document.getElementById("tableDate").value;
let time=document.getElementById("tableTime").value;
let guests=document.getElementById("tableGuests").value;

let msg="Table Booking - Mr & Mrs Food Maker%0A";

msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Date: "+date+"%0A";
msg+="Time: "+time+"%0A";
msg+="Guests: "+guests;

window.open("https://wa.me/918453049219?text="+msg);

}

</script>

</body>
</html>
