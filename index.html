<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Wings Restaurant</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#ff6a00;
}

h2{
margin-top:30px;
border-bottom:1px solid #444;
padding-bottom:5px;
}

.food{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

button{
background:#ff6a00;
border:none;
color:white;
width:35px;
height:35px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.cart{
background:#111;
padding:20px;
margin-top:40px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}

.orderbtn{
background:#ff6a00;
padding:12px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<h1>🔥 Hot Wings Restaurant</h1>

<div id="menu"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="orderbtn" onclick="sendOrder()">Send Order to WhatsApp</button>

</div>


<div class="cart">

<h2>Book Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">

<input id="bdate" type="date">
<input id="btime" type="time">

<select id="bpersons">
<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>
</select>

<button class="orderbtn" onclick="bookTable()">Book Table</button>

</div>

<script>

let menu = {

"Pizza":[
{name:"Paneer Veggies Pizza",price:210},
{name:"Corn Paneer Pizza",price:220},
{name:"Blockbuster Pizza",price:260},
{name:"Chicken Pizza",price:280},
{name:"Loaded All In One",price:300}
],

"Momos":[
{name:"Chicken Momo",price:70},
{name:"Veg Momo",price:50},
{name:"Deep Fried Momo",price:90},
{name:"Pan Fried Momo",price:90},
{name:"Honey Toast Momo",price:110},
{name:"Butter Toast Momo",price:110},
{name:"Hot Garlic Momo",price:100},
{name:"Chilli Soya Toast Momo",price:100},
{name:"Mayonnaise Momo",price:110},
{name:"Schezwan Momo",price:100},
{name:"Tandoori Momo",price:120},
{name:"Dahi Momo",price:120},
{name:"Afghani Momo",price:130},
{name:"Kurkure Momo",price:120},
{name:"Momo Thali (15pcs)",price:200},
{name:"Hariyali Momo",price:130},
{name:"Pizza Momo",price:140},
{name:"Wonton Momo",price:140}
],

"Burgers":[
{name:"Veg Burger",price:90},
{name:"Chicken Burger",price:130},
{name:"Chicken Cheese Burger",price:150},
{name:"Veg Cheese Burger",price:120}
],

"Drinks":[
{name:"Masala Coke",price:40},
{name:"Lassi",price:60},
{name:"Cold Coffee",price:80},
{name:"Lime Juice",price:40},
{name:"Coffee",price:30},
{name:"Coffee Xpresso",price:60}
],

"Biryani":[
{name:"Chicken Dum Biryani",price:180},
{name:"Paneer Dum Biryani",price:170},
{name:"Egg Biryani",price:150},
{name:"Mutton Dum Biryani",price:260}
],

"Tandoori":[
{name:"Chicken Tandoori",price:260},
{name:"Chicken Leg",price:120},
{name:"Chicken Breast",price:140},
{name:"Chicken Tikka",price:220},
{name:"Malai Tikka",price:240},
{name:"Hot Wings (4pcs)",price:160},
{name:"Afghani Chicken",price:260},
{name:"Paneer Tikka",price:220},
{name:"Prawn Tikka",price:280},
{name:"Fish Tikka",price:260}
]

}

let cart={}

function buildMenu(){

let menuDiv=document.getElementById("menu")

for(let category in menu){

let title=document.createElement("h2")
title.innerText=category
menuDiv.appendChild(title)

menu[category].forEach(food=>{

let div=document.createElement("div")
div.className="food"

div.innerHTML=`

<div>${food.name} ₹${food.price}</div>

<div class="qty">

<button onclick="change('${food.name}',${food.price},-1)">-</button>

<span id="${food.name}">0</span>

<button onclick="change('${food.name}',${food.price},1)">+</button>

</div>

`

menuDiv.appendChild(div)

})

}

}

function change(name,price,val){

if(!cart[name]) cart[name]={q:0,p:price}

cart[name].q+=val

if(cart[name].q<0) cart[name].q=0

document.getElementById(name).innerText=cart[name].q

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")

list.innerHTML=""

let total=0

for(let item in cart){

if(cart[item].q>0){

let li=document.createElement("li")

li.innerText=item+" x "+cart[item].q

list.appendChild(li)

total+=cart[item].q*cart[item].p

}

}

document.getElementById("total").innerText=total

}

function sendOrder(){

let msg="Food Order:%0A"

for(let item in cart){

if(cart[item].q>0){

msg+=item+" x "+cart[item].q+"%0A"

}

}

msg+="Name:"+document.getElementById("name").value+"%0A"
msg+="Phone:"+document.getElementById("phone").value+"%0A"
msg+="Address:"+document.getElementById("address").value

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let msg="Table Booking:%0A"

msg+="Name:"+document.getElementById("bname").value+"%0A"
msg+="Phone:"+document.getElementById("bphone").value+"%0A"
msg+="Date:"+document.getElementById("bdate").value+"%0A"
msg+="Time:"+document.getElementById("btime").value+"%0A"
msg+="Persons:"+document.getElementById("bpersons").value

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
