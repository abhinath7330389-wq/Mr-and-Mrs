<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Wings Restaurant</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
}

h1{
color:orange;
}

.section{
margin:30px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.item{
background:#222;
padding:15px;
border-radius:10px;
width:200px;
text-align:center;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
background:orange;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

input,select{
display:block;
margin:10px auto;
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

.cart{
background:#000;
padding:20px;
margin:20px;
}

</style>

</head>

<body>

<header>
<h1>🔥 Hot Wings Restaurant</h1>
<p>Online Order & Table Booking</p>
</header>

<div id="menuContainer"></div>

<div class="cart">

<h2>Your Cart</h2>
<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button onclick="sendOrder()">Order on WhatsApp</button>

</div>

<div class="cart">

<h2>Book Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">

<input id="bdate" type="date">
<input id="btime" type="time">

<select id="bpersons">
<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>
</select>

<button onclick="bookTable()">Book Table</button>

</div>

<script>

let menu = {

"Momos":[
{name:"Deep Fried Momo",price:90},
{name:"Pan Fried Momo",price:90},
{name:"Honey Toast Momo",price:110},
{name:"Butter Toast Momo",price:110},
{name:"Hot Garlic Momo",price:100},
{name:"Chilli Soya Toast Momo",price:100},
{name:"Mayonnaise Momo",price:110},
{name:"Schezwan Momo",price:100},
{name:"Tandoori Momo",price:120},
{name:"Dahi Momo",price:120},
{name:"Afghani Momo",price:130},
{name:"Kurkure Momo",price:120},
{name:"Momo Thali (15pcs)",price:200},
{name:"Hariyali Momo",price:130},
{name:"Pizza Momo",price:130},
{name:"Wonton Momo",price:140}
],

"Pizza":[
{name:"Margherita Pizza",price:199},
{name:"Paneer Cheese Pizza",price:249},
{name:"Paneer Tikka Pizza",price:269},
{name:"Chicken Cheese Pizza",price:299},
{name:"Meat Lovers Pizza",price:349},
{name:"Chicken Tikka Pizza",price:299},
{name:"Achari Chicken Pizza",price:299},
{name:"Mixed Pizza (Large)",price:399},
{name:"Hot Wings Special Pizza (Super Large)",price:449},
{name:"Corn Cheese Pizza",price:249},
{name:"Special Combo Pizza",price:499}
],

"Burgers":[
{name:"Veg Burger",price:60},
{name:"Chicken Burger",price:80},
{name:"Chicken Cheese Burger",price:100},
{name:"Veg Cheese Burger",price:80}
],

"Biryani":[
{name:"Chicken Dum Biryani",price:180},
{name:"Paneer Dum Biryani",price:170},
{name:"Egg Biryani",price:150},
{name:"Mutton Dum Biryani",price:250}
]

}

let cart={}

function buildMenu(){

let container=document.getElementById("menuContainer")

for(let category in menu){

let section=document.createElement("div")
section.className="section"

let title=document.createElement("h2")
title.innerText=category

section.appendChild(title)

let box=document.createElement("div")
box.className="menu"

menu[category].forEach(food=>{

let item=document.createElement("div")
item.className="item"

item.innerHTML=`
<h4>${food.name}</h4>
<p>₹${food.price}</p>

<div class="qty">
<button onclick="changeQty('${food.name}',${food.price},-1)">-</button>
<span id="${food.name}">0</span>
<button onclick="changeQty('${food.name}',${food.price},1)">+</button>
</div>
`

box.appendChild(item)

})

section.appendChild(box)
container.appendChild(section)

}

}

function changeQty(name,price,val){

if(!cart[name]) cart[name]={qty:0,price:price}

cart[name].qty+=val

if(cart[name].qty<0) cart[name].qty=0

document.getElementById(name).innerText=cart[name].qty

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")
list.innerHTML=""

let total=0

for(let item in cart){

if(cart[item].qty>0){

let li=document.createElement("li")

li.innerText=item+" x "+cart[item].qty

list.appendChild(li)

total+=cart[item].qty*cart[item].price

}

}

document.getElementById("total").innerText=total

}

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

let msg="Food Order:%0A"

for(let item in cart){

if(cart[item].qty>0){
msg+=item+" x "+cart[item].qty+"%0A"
}

}

msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Address:"+address

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let name=document.getElementById("bname").value
let phone=document.getElementById("bphone").value
let date=document.getElementById("bdate").value
let time=document.getElementById("btime").value
let persons=document.getElementById("bpersons").value

let msg="Table Booking:%0A"
msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Date:"+date+"%0A"
msg+="Time:"+time+"%0A"
msg+="Persons:"+persons

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
