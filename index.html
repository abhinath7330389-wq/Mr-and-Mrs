<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Wings Restaurant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#8b0000;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.category{
margin-top:30px;
}

.category h2{
border-bottom:2px solid #ddd;
padding-bottom:5px;
}

.food{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

button{
background:#ff6b00;
border:none;
color:white;
width:35px;
height:35px;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.cart{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.orderbtn{
background:#8b0000;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
}

</style>

</head>

<body>

<header>

<h1>🔥 Hot Wings Restaurant</h1>
<p>Online Food Ordering & Table Booking</p>

</header>

<div class="container">

<div id="menu"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="orderbtn" onclick="sendOrder()">Order on WhatsApp</button>

</div>


<div class="cart">

<h2>Book Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">

<input id="bdate" type="date">
<input id="btime" type="time">

<select id="bpersons">

<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>

</select>

<button class="orderbtn" onclick="bookTable()">Book Table</button>

</div>

</div>

<script>

let menu={

"Momos":[
"Deep Fried Momo",
"Pan Fried Momo",
"Honey Toast Momo",
"Butter Toast Momo",
"Hot Garlic Momo",
"Chilli Soya Toast Momo",
"Mayonnaise Momo",
"Schezwan Momo",
"Tandoori Momo",
"Dahi Momo",
"Afghani Momo",
"Kurkure Momo",
"Momo Thali (15pcs)",
"Hariyali Momo",
"Pizza Momo",
"Wonton Momo"
],

"Pizza":[
"Margherita Pizza",
"Paneer Cheese Pizza",
"Paneer Tikka Pizza",
"Chicken Cheese Pizza",
"Meat Lovers Pizza",
"Chicken Tikka Pizza",
"Achari Chicken Pizza",
"Mixed Pizza (Large)",
"Hot Wings Special Pizza (Super large)",
"Corn Cheese Pizza",
"Special Combo Pizza"
],

"Burgers":[
"Veg Burger",
"Chicken Burger",
"Chicken Cheese Burger",
"Veg Cheese Burger"
],

"Beverages":[
"Coffee",
"Lime Juice",
"Masala Cold Drink",
"Cold Coffee",
"Lassi",
"Coffee Xpresso"
],

"Rolls":[
"Veg Roll",
"Egg Roll",
"Double Egg Roll",
"Jumbo Egg Roll",
"Chicken Roll",
"Egg Chicken Roll",
"Paneer Roll",
"Special Roll"
],

"Veg Starters":[
"Paneer Pakoda",
"Chilli Paneer Dry Fry",
"Veg Manchurian",
"Paneer Manchurian",
"French Fry",
"Honey Chilli Potato",
"Crispy Chilli Corn"
]

}

let cart={}

function buildMenu(){

let container=document.getElementById("menu")

for(let category in menu){

let section=document.createElement("div")
section.className="category"

let title=document.createElement("h2")
title.innerText=category

section.appendChild(title)

menu[category].forEach(food=>{

let div=document.createElement("div")
div.className="food"

div.innerHTML=`

<div>${food}</div>

<div class="qty">

<button onclick="change('${food}',-1)">-</button>

<span id="${food}">0</span>

<button onclick="change('${food}',1)">+</button>

</div>

`

section.appendChild(div)

})

container.appendChild(section)

}

}

function change(name,val){

if(!cart[name]) cart[name]=0

cart[name]+=val

if(cart[name]<0) cart[name]=0

document.getElementById(name).innerText=cart[name]

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")
list.innerHTML=""

for(let item in cart){

if(cart[item]>0){

let li=document.createElement("li")

li.innerText=item+" x "+cart[item]

list.appendChild(li)

}

}

}

function sendOrder(){

let msg="Food Order:%0A"

for(let item in cart){

if(cart[item]>0){
msg+=item+" x "+cart[item]+"%0A"
}

}

msg+="Name:"+document.getElementById("name").value+"%0A"
msg+="Phone:"+document.getElementById("phone").value+"%0A"
msg+="Address:"+document.getElementById("address").value

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let msg="Table Booking:%0A"

msg+="Name:"+document.getElementById("bname").value+"%0A"
msg+="Phone:"+document.getElementById("bphone").value+"%0A"
msg+="Date:"+document.getElementById("bdate").value+"%0A"
msg+="Time:"+document.getElementById("btime").value+"%0A"
msg+="Persons:"+document.getElementById("bpersons").value

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
