<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Wings Restaurant</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#8b0000;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.category{
margin-top:40px;
}

.category h2{
border-bottom:2px solid #ddd;
padding-bottom:6px;
}

.food{
background:white;
margin:10px 0;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

button{
background:#ff6b00;
border:none;
color:white;
width:35px;
height:35px;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.cart{
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.orderbtn{
background:#8b0000;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
}

</style>
</head>

<body>

<header>

<h1>🔥 Hot Wings Restaurant</h1>
<p>Online Food Ordering</p>

</header>

<div class="container">

<div id="menu"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total Price: ₹<span id="total">0</span></h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="orderbtn" onclick="sendOrder()">Order via WhatsApp</button>

</div>


<div class="cart">

<h2>Book Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">
<input type="date" id="bdate">
<input type="time" id="btime">

<select id="bpersons">
<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>
</select>

<button class="orderbtn" onclick="bookTable()">Book Table</button>

</div>

</div>

<script>

let menu = {

{name:"Tandoori Momo",price:180},
{name:"Dahi Momo",price:150},
{name:"Afghani Momo",price:180},
{name:"Kurkure Momo",price:160},
{name:"Momo Thali (15pcs)",price:220},
{name:"Hariyali Momo",price:180},
{name:"Pizza Momo",price:200},
{name:"Wonton Momo",price:180}
],

"Pizza":[
{name:"Margherita Pizza",price:180},
{name:"Paneer Cheese Pizza",price:220},
{name:"Paneer Tikka Pizza",price:240},
{name:"Chicken Cheese Pizza",price:260},
{name:"Meat Lovers Pizza",price:320},
{name:"Chicken Tikka Pizza",price:260},
{name:"Achari Chicken Pizza",price:260},
{name:"Mixed Pizza (Large)",price:350},
{name:"Hot Wings Special Pizza (Super large)",price:450},
{name:"Corn Cheese Pizza",price:220},
{name:"Special Combo Pizza",price:300}
],

"Burgers":[
{name:"Veg Burger",price:90},
{name:"Chicken Burger",price:120},
{name:"Chicken Cheese Burger",price:150},
{name:"Veg Cheese Burger",price:120}
],

"Beverages":[

{name:"Masala Cold Drink",price:50},
{name:"Cold Coffee",price:80},
{name:"Lassi",price:70},
{name:"Coffee Xpresso",price:80}
],

"Rolls":[
{name:"Veg Roll",price:90},
{name:"Egg Roll",price:100},
{name:"Double Egg Roll",price:120},
{name:"Jumbo Egg Roll",price:140},
{name:"Chicken Roll",price:120},
{name:"Egg Chicken Roll",price:140},
{name:"Panner Roll",price:110},
{name:"Special Roll",price:160}
],

"Veg Starters":[
{name:"Paneer Pakoda",price:140},
{name:"Chilli Paneer Dry Fry",price:180},
{name:"Veg Manchurian",price:160},
{name:"Panner Manchurian",price:180},
{name:"French Fry",price:120},
{name:"Honey Chilli Potatoo",price:150},
{name:"Crispy Chhilli Corn",price:150}
],

"Rice":[
{name:"Plain Rice",price:80},
{name:"Ghee Rice",price:100},
{name:"Veg Fried Rice",price:140},
{name:"Jeera Rice",price:120},
{name:"Egg Fried Rice",price:150},
{name:"Paneer Fried Rice",price:160},
{name:"Andhra Veg Rice",price:160},
{name:"Chicken Fried Rice",price:170},
{name:"Andhra Chicken Rice",price:180},
{name:"Chicken Schezwan Fried Rice",price:180},
{name:"Mixed Fried Rice",price:200},
{name:"Singapoori Rice",price:180},
{name:"Korean Rice",price:180},
{name:"Hong Kong Rice",price:180}
],

"Noodles":[
{name:"Veg Noodles",price:140},
{name:"Egg Noodles",price:150},

{name:"Paneer Noodles",price:160},

],

"Biryani":[
{name:"Chicken Dum Biryani",price:220},
{name:"Paneer Dum Biryani",price:200},
{name:"Egg Biryani",price:180},
{name:"Mutton Dum Biryani",price:320}
]

}

let cart={}

function buildMenu(){

let container=document.getElementById("menu")

for(let category in menu){

let section=document.createElement("div")
section.className="category"

let title=document.createElement("h2")
title.innerText=category
section.appendChild(title)

menu[category].forEach(food=>{

let div=document.createElement("div")
div.className="food"

div.innerHTML=`

<div>${food.name} - ₹${food.price}</div>

<div class="qty">

<button onclick="change('${food.name}',-1)">-</button>

<span id="${food.name}">0</span>

<button onclick="change('${food.name}',1)">+</button>

</div>

`

section.appendChild(div)

})

container.appendChild(section)

}

}

function change(name,val){

if(!cart[name]) cart[name]=0

cart[name]+=val

if(cart[name]<0) cart[name]=0

document.getElementById(name).innerText=cart[name]

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")
list.innerHTML=""

let total=0

for(let category in menu){

menu[category].forEach(food=>{

let qty=cart[food.name] || 0

if(qty>0){

let itemTotal = food.price * qty
total += itemTotal

let li=document.createElement("li")

li.innerText = food.name + " x " + qty + " = ₹" + itemTotal

list.appendChild(li)

}

})

}

document.getElementById("total").innerText = total

}

function sendOrder(){

let msg="Hot Wings Order:%0A"

let total=0

for(let category in menu){

menu[category].forEach(food=>{

let qty=cart[food.name] || 0

if(qty>0){

let itemTotal = food.price * qty
total += itemTotal

msg+=food.name+" x "+qty+" = ₹"+itemTotal+"%0A"

}

})

}

msg+="%0ATotal: ₹"+total+"%0A"

msg+="Name:"+document.getElementById("name").value+"%0A"
msg+="Phone:"+document.getElementById("phone").value+"%0A"
msg+="Address:"+document.getElementById("address").value

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let msg="Table Booking:%0A"

msg+="Name:"+document.getElementById("bname").value+"%0A"
msg+="Phone:"+document.getElementById("bphone").value+"%0A"
msg+="Date:"+document.getElementById("bdate").value+"%0A"
msg+="Time:"+document.getElementById("btime").value+"%0A"
msg+="Persons:"+document.getElementById("bpersons").value

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
